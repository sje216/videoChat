name: Deploy SFU Server

on:
  push:
    branches: ["master","main"] # main 브랜치에 푸시하면 로봇 작동
    paths:
      - 'sfu-server/**' # sfu-server 폴더 내의 파일이 변경될 때만 작동

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # docker hub 로그인 (이미지 업로드를 위해 필요)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker 이미지 빌드 및 서버 전송
      - name: Build and Push Docker Image
        run: |
          cd sfu-server
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/joom-sfu:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/joom-sfu:latest

      # 서버에 접속해 실행하는 명령어
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with: 
          context: ./sfu-server
          host: ${{ secrets.EC2_SFU_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
           # 기존 3000 컨테이너가 있으면 멈추고 삭제 (Nginx 역프록시가 3000을 바라보고 있음)
            docker stop joom-sfu || true
            docker rm joom-sfu || true

            # 최신 이미지 다운로드 후 3000 포트로 실행
            docker run -d --name joom-sfu \
              --net=host \
              --restart always \
              -e REDIS_HOST=${{ secrets.REDIS_HOST }} \
              -e REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
              -e ANNOUNCED_IP=${{ secrets.EC2_SFU_HOST }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/joom-sfu:latest