name: Qodana Scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jetbrains/qodana-action@v2024.3.0
        with:
          image: jetbrains/qodana-jvm-community:latest
          path: .
      - name: Upload Qodana report
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: .qodana/results