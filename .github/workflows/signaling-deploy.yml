name: Deploy Signaling Server

on:
  push:
    branches: ["master","main"] # main 브랜치에 푸시하면 로봇 작동
    paths:
      - 'signaling-server/**' # signaling-server 폴더 내의 파일이 변경될 때만 작동

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 📌 이 부분을 반드시 추가해야 토큰에 업로드 권한이 부여됩니다!
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

        # java env setting (JDK 17 기준)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 빌드 권한 부여 및 빌드 (JAR 생성)
      - name: Build with Gradle
        run: |
          cd signaling-server
          chmod +x ./gradlew
          ./gradlew clean bootjar # 테스트는 일단 제외하고 빌드

      # docker hub 로그인 (이미지 업로드를 위해 필요)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker 이미지 빌드 및 서버 전송
      - name: Build and Push Docker Image
        run: |
          cd signaling-server
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest

      # 서버에 접속해 실행하는 명령어
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with: 
          context: ./signaling-server
          host: ${{ secrets.EC2_SIGNALING_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
           # 1. 기존 컨테이너가 있으면 멈추고 삭제 (이름 통일)
            docker stop joom-signaling-8080 || true
            docker rm joom-signaling-8080 || true
            
            # 2. 기존의 쓸모없는 이미지 청소 (용량 확보)
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest || true

            # 3. 최신 이미지 다운로드
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest

            # 4. 📌 올바른 환경 변수명과 올바른 이미지 이름으로 실행
            docker run -d --name joom-signaling-8080 \
            --net=host \
            --restart always \
            -e SPRING_DATA_REDIS_HOST=${{ secrets.REDIS_HOST }} \
            -e SPRING_DATA_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest