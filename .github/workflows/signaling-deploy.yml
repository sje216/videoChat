name: Deploy Signaling Server

on:
  push:
    branches: ["master","main"] # main 브랜치에 푸시하면 로봇 작동
    paths:
      - 'signaling-server/**' # signaling-server 폴더 내의 파일이 변경될 때만 작동

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 📌 이 부분을 반드시 추가해야 토큰에 업로드 권한이 부여됩니다!
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

        # java env setting (JDK 17 기준)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 빌드 권한 부여 및 빌드 (JAR 생성)
      - name: Build with Gradle
        run: |
          cd signaling-server
          chmod +x ./gradlew
          ./gradlew clean bootjar # 테스트는 일단 제외하고 빌드

      # docker hub 로그인 (이미지 업로드를 위해 필요)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker 이미지 빌드 및 서버 전송
      - name: Build and Push Docker Image
        run: |
          cd signaling-server
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest

      # 서버에 접속해 실행하는 명령어
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with: 
          context: ./signaling-server
          host: ${{ secrets.EC2_SIGNALING_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
           # 기존 8081 컨테이너가 있으면 멈추고 삭제 (Nginx 역프록시가 8081을 바라보고 있음)
            docker stop signaling-server || true
            docker rm signaling-server || true

            # 최신 이미지 다운로드 후 8081 포트로 실행
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest
            docker run -d --name signaling-server \
              -p 8081:8080 \
              --restart always \
              -e SPRING_REDIS_HOST=${{ secrets.REDIS_HOST }} \
              -e SPRING_REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/signaling-server:latest
        