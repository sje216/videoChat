name: Java CI/CD with Docker

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 1. 빌드 (signaling-server 폴더로 이동해서 실행)
    - name: Build with Gradle
      run: |
        cd signaling-server
        chmod +x ./gradlew
        ./gradlew build -x test

    # 2. 빌드된 JAR 파일을 서버 1호기로 전송 (SCP)
    - name: Copy JAR to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        source: "signaling-server/build/libs/*.jar"
        target: "~/app"
        strip_components: 3

    # 3. 서버 1호기에서 도커로 실행 (SSH)
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        script: |
          sudo docker stop signaling-server || true
          sudo docker rm signaling-server || true
          cd ~/app
          # 가장 가벼운 자바 이미지로 실행
          sudo docker run -d --name signaling-server \
            -p 8080:8080 \
            -v $(pwd):/app \
            openjdk:17-jdk-slim \
            java -jar /app/*.jar