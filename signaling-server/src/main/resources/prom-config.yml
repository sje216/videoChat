global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'joom-spring-boot'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'joom-sfu'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:3000']